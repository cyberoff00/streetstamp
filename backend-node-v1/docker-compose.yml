services:
  postgres:
    image: postgres:16-alpine
    container_name: streetstamps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-streetstamps}"
      POSTGRES_USER: "${POSTGRES_USER:-streetstamps}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streetstamps -d streetstamps"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    container_name: streetstamps-node-v1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      PORT: "${PORT:-18080}"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env}"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL in .env}"
      PGSSL: "${PGSSL:-disable}"
      PG_STATE_KEY: "${PG_STATE_KEY:-global}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS in .env}"
      JSON_BODY_LIMIT_MB: "${JSON_BODY_LIMIT_MB:-6}"
      MEDIA_UPLOAD_MAX_BYTES: "${MEDIA_UPLOAD_MAX_BYTES:-10485760}"
      AUTH_RATE_LIMIT_WINDOW_MS: "${AUTH_RATE_LIMIT_WINDOW_MS:-900000}"
      AUTH_RATE_LIMIT_MAX: "${AUTH_RATE_LIMIT_MAX:-20}"
      WRITE_RATE_LIMIT_WINDOW_MS: "${WRITE_RATE_LIMIT_WINDOW_MS:-60000}"
      WRITE_RATE_LIMIT_MAX: "${WRITE_RATE_LIMIT_MAX:-40}"
      UPLOAD_RATE_LIMIT_WINDOW_MS: "${UPLOAD_RATE_LIMIT_WINDOW_MS:-60000}"
      UPLOAD_RATE_LIMIT_MAX: "${UPLOAD_RATE_LIMIT_MAX:-10}"
      DATA_FILE: "${DATA_FILE:-/app/data/data.json}"
      MEDIA_DIR: "${MEDIA_DIR:-/app/media}"
      MEDIA_PUBLIC_BASE: "${MEDIA_PUBLIC_BASE:-https://worldo-api.cyberkkk.cn}"
      AUTH_LINK_BASE: "${AUTH_LINK_BASE:-https://worldo-api.cyberkkk.cn}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-}"
      RESEND_API_BASE: "${RESEND_API_BASE:-https://api.resend.com}"
      SES_FROM_EMAIL: "${SES_FROM_EMAIL:-}"
      APPLE_AUDIENCES: "${APPLE_AUDIENCES:-com.claire.streetstamps}"
      R2_ACCOUNT_ID: "${R2_ACCOUNT_ID:-}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:-}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY:-}"
      R2_BUCKET: "${R2_BUCKET:-}"
      R2_ENDPOINT: "${R2_ENDPOINT:-}"
      R2_REGION: "${R2_REGION:-auto}"
      R2_PUBLIC_BASE: "${R2_PUBLIC_BASE:-}"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    ports:
      - "127.0.0.1:18080:18080"
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18080/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
