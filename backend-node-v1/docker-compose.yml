services:
  api:
    build: .
    container_name: streetstamps-node-v1
    restart: unless-stopped
    environment:
      PORT: "18080"
      JWT_SECRET: "change-me"
      DATA_FILE: "/app/data/data.json"
      MEDIA_DIR: "/app/media"
      MEDIA_PUBLIC_BASE: "https://api.streetstamps.cyberkkk.cn"
      R2_ACCOUNT_ID: ""
      R2_ACCESS_KEY_ID: ""
      R2_SECRET_ACCESS_KEY: ""
      R2_BUCKET: ""
      R2_ENDPOINT: ""
      R2_REGION: "auto"
      R2_PUBLIC_BASE: ""
    ports:
      - "18080:18080"
    volumes:
      - ./data:/app/data
      - ./media:/app/media
