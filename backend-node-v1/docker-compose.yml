services:
  postgres:
    image: postgres:16-alpine
    container_name: streetstamps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "streetstamps"
      POSTGRES_USER: "streetstamps"
      POSTGRES_PASSWORD: "streetstamps"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streetstamps -d streetstamps"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    container_name: streetstamps-node-v1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "18080"
      JWT_SECRET: "change-me"
      DATABASE_URL: "postgresql://streetstamps:streetstamps@postgres:5432/streetstamps"
      PGSSL: "disable"
      PG_STATE_KEY: "global"
      DATA_FILE: "/app/data/data.json"
      MEDIA_DIR: "/app/media"
      MEDIA_PUBLIC_BASE: "https://api.streetstamps.cyberkkk.cn"
      R2_ACCOUNT_ID: ""
      R2_ACCESS_KEY_ID: ""
      R2_SECRET_ACCESS_KEY: ""
      R2_BUCKET: ""
      R2_ENDPOINT: ""
      R2_REGION: "auto"
      R2_PUBLIC_BASE: ""
    ports:
      - "18080:18080"
    volumes:
      - ./data:/app/data
      - ./media:/app/media

volumes:
  postgres_data:
